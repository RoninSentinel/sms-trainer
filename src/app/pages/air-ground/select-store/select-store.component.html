<div class="title-bar">Air To Ground: Select Store</div>
<div class="page-layout-full">
  <div class="store-list">
    @for (s of availableStores(); track s.type) {
      <div class="store-row" [class.store-selected]="isSelected(s.type)">
        <div class="store-icon">
          <table>
            <tr>
              <td>
                <span class="store-name family-{{ s.family.toLowerCase() }}">{{ s.label }}</span>
              </td>
            </tr>
            <tr>
              <td>
                <img [src]="s.icon" [alt]="s.label" class="store-icon-img family-{{ s.family.toLowerCase() }}" />
              </td>
            </tr>
          </table>
        </div>
        <div class="store-btns">
          <button class="sms-btn ref" [class.active]="isSelected(s.type)" (click)="selectStore(s.type)">
            {{ isSelected(s.type) ? 'Deselect' : 'Select' }}
          </button>
          <button class="sms-btn ref" (click)="setSingle(s.type)">Single</button>

          <app-guarded-button
            label="Power Off"
            [active]="isStorePowered(s.type)"
            [disabled]="isPowerDisabled(s.type)"
            [autoCloseMs]="5000"
            curtainColor="brass"
            (guardedClick)="executePowerOff(s.type)"
          >
          </app-guarded-button>
        </div>
      </div>
    } @empty {
      <div class="empty-message">No stores available</div>
    }
  </div>
</div>
