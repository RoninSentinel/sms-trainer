<div class="title-bar">Air To Ground: Release Settings</div>
<div class="page-layout-ref">

  <!-- LEFT: run-in settings (shared) -->
  <div class="settings-content">
    <div *ngIf="!selectedStation || !rel" class="no-selection">Select a station using the arrows on the right.</div>

    <ng-container *ngIf="selectedStation && rel">

      <div class="ref-col-wrap">
        <!-- Run-In Settings -->
        <div class="ref-col">
          <div class="ref-section-label">Run-In Settings</div>
          <div class="ref-field-row">
            <span class="ref-label">Run-In Mode</span>
            <button class="sms-btn ref-val" (click)="cycleRunInMode()">{{ rel.runInMode }}</button>
          </div>
          <div class="ref-field-row">
            <span class="ref-label">Run-In Course</span>
            <div class="ref-input-box">
              <input class="sms-input ref" type="number" [(ngModel)]="rel.runInCourse" (change)="save()" />
            </div>
          </div>
        </div>

        <!-- RIGHT column: family-specific -->
        <div class="ref-col">

          <!-- HELLFIRE: WEZ Settings + Release Distance -->
          <ng-container *ngIf="family === 'Hellfire'">
            <div class="ref-section-label">WEZ Settings</div>
            <div class="ref-field-row">
              <span class="ref-label">WEZ Mode</span>
              <button class="sms-btn ref-val" (click)="cycleWezMode()">{{ rel.wezMode }}</button>
            </div>
            <div class="ref-field-row">
              <span class="ref-label">RTI Azimuth</span>
              <div class="ref-input-box" [class.disabled]="rel.wezMode === 'Auto'">
                <input class="sms-input ref" type="number" [(ngModel)]="rel.rtiAzimuth" (change)="save()" [disabled]="rel.wezMode === 'Auto'" />
              </div>
            </div>
            <div class="ref-section-label" style="margin-top:14px">Release Distance</div>
            <div class="ref-field-row">
              <span class="ref-label">Minimal</span>
              <div class="ref-input-box">
                <input class="sms-input ref" type="number" step="0.01" [(ngModel)]="rel.releaseDistMin" (change)="save()" />
              </div>
            </div>
            <div class="ref-field-row">
              <span class="ref-label">Desired</span>
              <div class="ref-input-box">
                <input class="sms-input ref" type="number" step="0.01" [(ngModel)]="rel.releaseDistDesired" (change)="save()" />
              </div>
            </div>
            <div class="ref-field-row">
              <span class="ref-label">Maximal</span>
              <div class="ref-input-box">
                <input class="sms-input ref" type="number" step="0.01" [(ngModel)]="rel.releaseDistMax" (change)="save()" />
              </div>
            </div>
          </ng-container>

          <!-- GBU / JDAM: Release Mode -->
          <ng-container *ngIf="family === 'GBU' || family === 'JDAM'">
            <div class="ref-section-label">Release Setting</div>
            <div class="ref-field-row">
              <span class="ref-label">Release Mode</span>
              <button class="sms-btn ref-val" (click)="cycleReleaseMode()">{{ rel.releaseMode }}</button>
            </div>
          </ng-container>

        </div>
      </div>

    </ng-container>
  </div>

  <!-- RIGHT: station selector -->
  <div class="station-selector">
    <div class="sta-label">Station: {{ selectedStationId ?? '--' }}</div>
    <div class="sta-arrows">
      <button class="sms-btn sta-arrow" (click)="prevStation()" [disabled]="!canGoPrev">&#8592;</button>
      <button class="sms-btn sta-arrow" (click)="nextStation()" [disabled]="!canGoNext">&#8594;</button>
    </div>
  </div>

</div>
