<div class="title-bar">Air To Ground: Store Settings</div>
<div class="page-layout-ref">

  <!-- LEFT: settings content -->
  <div class="settings-content">
    <div *ngIf="!selectedStation" class="no-selection">Select a station using the arrows.</div>

    <!-- HELLFIRE -->
    <ng-container *ngIf="selectedStation && family === 'Hellfire' && hf">
      <div class="ref-section-label">Launch Settings</div>
      <div class="ref-field-row">
        <span class="ref-label">Launch Mode</span>
        <button class="sms-btn ref-val" (click)="cycleHfLaunchMode()">{{ hf.launchMode }}</button>
      </div>
      <div class="ref-field-row">
        <span class="ref-label">PRF Code</span>
        <div class="ref-input-box">
          <input class="sms-input ref" [(ngModel)]="hf.laserCode" maxlength="4" (change)="saveHf()" />
        </div>
      </div>
      <div class="ref-field-row">
        <span class="ref-label">TM Power</span>
        <button class="sms-btn ref-val" [class.active]="hf.tmPower" (click)="hf.tmPower=!hf.tmPower; saveHf()">
          {{ hf.tmPower ? 'On' : 'Off' }}
        </button>
      </div>
    </ng-container>

    <!-- GBU -->
    <ng-container *ngIf="selectedStation && (family === 'GBU' || family === 'JDAM') && gbu">
      <div class="ref-section-label">Fuze Setting</div>
      <div class="ref-field-row">
        <span class="ref-label">Fuze</span>
        <button class="sms-btn ref-val" (click)="cycleGbuFuzing()">{{ gbu.fuzingType }}</button>
      </div>
      <div class="ref-section-label" style="margin-top:16px">PRF Setting</div>
      <div class="ref-field-row">
        <span class="ref-label">PRF Code</span>
        <div class="ref-input-box">
          <input class="sms-input ref" [(ngModel)]="gbu.prf" maxlength="4" (change)="saveGbu()" />
        </div>
      </div>
    </ng-container>
  </div>

  <!-- RIGHT: station selector -->
  <div class="station-selector">
    <div class="sta-label">Station: {{ selectedStationId ?? '--' }}</div>
    <div class="sta-arrows">
      <button class="sms-btn sta-arrow" (click)="prevStation()" [disabled]="!canGoPrev">&#8592;</button>
      <button class="sms-btn sta-arrow" (click)="nextStation()" [disabled]="!canGoNext">&#8594;</button>
    </div>
    <div class="sta-store-label">Store: {{ storeIndex }}</div>
    <div class="sta-arrows">
      <button class="sms-btn sta-arrow">&#8593;</button>
      <button class="sms-btn sta-arrow">&#8595;</button>
    </div>
    <div class="apply-to-label">Apply To</div>
    <button class="sms-btn apply-btn">Type</button>
    <div *ngIf="segInfo" class="seg-label">Seg: {{ segInfo }}</div>
  </div>

</div>
